name: DiGA Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run DiGA monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DIGA_API_TOKEN: ${{ secrets.DIGA_API_TOKEN }}
        run: python -m src.main run --notify

      - name: Create or update monitoring data pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          commit-message: Update DiGA monitoring data
          branch: automated-monitoring-data
          base: main
          title: Update DiGA monitoring data
          body: |
            Automated DiGA monitoring run.

            This pull request contains only generated monitoring output:
            - `data/snapshots`
            - `outputs/changes`
          add-paths: |
            data/snapshots
            outputs/changes
          delete-branch: false
